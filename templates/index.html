<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>板块强度实时监控</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f6fa; color: #2c3e50; padding: 16px;
  }
  .header {
    background: #fff; padding: 14px 20px; border-radius: 8px; margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    display: flex; align-items: center; flex-wrap: wrap; gap: 16px;
  }
  .header h1 { font-size: 20px; color: #1a1a2e; margin-right: 8px; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .controls label { font-size: 13px; color: #666; }
  select, button, input {
    padding: 6px 12px; border: 1px solid #dcdfe6; border-radius: 4px;
    font-size: 13px; background: #fff; cursor: pointer;
  }
  button.primary { background: #409eff; color: #fff; border-color: #409eff; }
  button.primary:hover { background: #66b1ff; }
  .status { margin-left: auto; font-size: 13px; color: #888; }
  .status .live { color: #67c23a; font-weight: bold; }
  .status .loading { color: #e6a23c; }

  .stats-bar {
    display: flex; gap: 18px; padding: 10px 20px; background: #fff;
    border-radius: 8px; margin-bottom: 14px; font-size: 13px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); flex-wrap: wrap;
  }
  .stats-bar .item { color: #555; }
  .stats-bar .item b { color: #1a1a2e; font-size: 15px; }
  .stats-bar .up { color: #f56c6c; }
  .stats-bar .down { color: #67c23a; }

  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .panel {
    background: #fff; border-radius: 8px; padding: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .panel h2 { font-size: 15px; margin-bottom: 10px; color: #1a1a2e; }
  .panel h2 .sub { font-size: 12px; color: #999; font-weight: normal; }

  .members-section {
    background: #fff; border-radius: 8px; padding: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .members-section h2 { font-size: 15px; margin-bottom: 10px; color: #1a1a2e; }
  .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .sector-card {
    border: 1px solid #ebeef5; border-radius: 6px; overflow: hidden;
  }
  .sector-card .card-head {
    padding: 8px 12px; font-size: 13px; font-weight: bold; color: #fff;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sector-card .card-head .score { font-size: 12px; opacity: 0.9; }
  .sector-card table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .sector-card th, .sector-card td {
    padding: 5px 8px; text-align: right; border-bottom: 1px solid #f0f0f0;
  }
  .sector-card th { background: #fafafa; color: #888; font-weight: normal; }
  .sector-card td:first-child, .sector-card th:first-child { text-align: left; }
  .sector-card td.up { color: #f56c6c; }
  .sector-card td.down { color: #67c23a; }
  .sector-card td.limit { color: #fff; background: #f56c6c; font-weight: bold; }
  .empty-msg { color: #999; text-align: center; padding: 30px; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>板块强度监控</h1>
  <div class="controls">
    <label>模式：</label>
    <select id="modeSel" onchange="onModeChange()">
      <option value="history">历史（收盘）</option>
      <option value="realtime">实时（盘中）</option>
    </select>
    <label>日期：</label>
    <select id="dateSel" onchange="onDateChange()"></select>
    <label>实时时段：</label>
    <input type="time" id="startTime" value="09:30" style="display:none">
    <input type="time" id="endTime" style="display:none">
    <button class="primary" onclick="refresh()">刷新</button>
  </div>
  <div class="status" id="statusBar"></div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="panels">
  <div class="panel">
    <h2>Top 10 强势板块 <span class="sub">点击柱子查看成分股</span></h2>
    <div id="topChart" style="height:360px;"></div>
  </div>
  <div class="panel">
    <h2>Bottom 10 弱势板块</h2>
    <div id="bottomChart" style="height:360px;"></div>
  </div>
</div>

<div class="members-section">
  <h2>Top 板块成分股（综合评分 Top10）<span class="sub" id="modeHint"></span></h2>
  <div class="members-grid" id="membersGrid">
    <div class="empty-msg">请选择日期或开启实时模式</div>
  </div>
</div>

<script>
let pollTimer = null;
const POLL_INTERVAL = 15000; // 15秒轮询

function setStatus(text, cls) {
  const el = document.getElementById('statusBar');
  el.innerHTML = `<span class="${cls||''}">${text}</span>`;
}

function onModeChange() {
  const mode = document.getElementById('modeSel').value;
  const isRealtime = mode === 'realtime';
  document.getElementById('startTime').style.display = isRealtime ? '' : 'none';
  document.getElementById('endTime').style.display = isRealtime ? '' : 'none';
  document.getElementById('modeHint').textContent = isRealtime
    ? '（实时：涨幅/涨速/实体/涨停 加权）' : '（历史：仅按当日涨幅排序）';

  // 实时模式：启动轮询；历史模式：停止
  stopPolling();
  if (isRealtime) startPolling();
  refresh();
}

function onDateChange() { refresh(); }

function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(refresh, POLL_INTERVAL);
  setStatus('实时模式 · 自动刷新 15s', 'live');
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function loadDates() {
  try {
    const r = await fetch('/api/dates');
    const data = await r.json();
    const sel = document.getElementById('dateSel');
    sel.innerHTML = data.dates.map(d => `<option value="${d}">${d}</option>`).join('');
    if (data.dates.length === 0) {
      sel.innerHTML = '<option value="">无数据</option>';
    }
  } catch(e) { console.error(e); }
}

async function refresh() {
  const mode = document.getElementById('modeSel').value;
  setStatus('加载中...', 'loading');

  let url, payload;
  if (mode === 'realtime') {
    const st = document.getElementById('startTime').value;
    const et = document.getElementById('endTime').value;
    const params = new URLSearchParams({start_time: st});
    if (et) params.set('end_time', et);
    url = '/api/realtime/dashboard?' + params.toString();
    payload = await fetchJson(url);
  } else {
    const date = document.getElementById('dateSel').value;
    if (!date) { setStatus('请选择日期', ''); return; }
    url = '/api/history/dashboard?date=' + date + '&top_n=10';
    payload = await fetchJson(url);
  }

  if (payload.error) {
    setStatus('⚠ ' + payload.error, '');
    document.getElementById('statsBar').innerHTML = '';
    document.getElementById('topChart').innerHTML = '';
    document.getElementById('bottomChart').innerHTML = '';
    document.getElementById('membersGrid').innerHTML = '<div class="empty-msg">' + payload.error + '</div>';
    return;
  }

  renderStats(payload);
  renderCharts(payload);
  renderMembers(payload);
  const ts = payload.snapshot_time || payload.date || '';
  setStatus(mode === 'realtime' ? `实时 · 更新 ${ts} · 自动 15s` : `历史 · ${ts}`, 'live');
}

async function fetchJson(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch(e) {
    return {error: '请求失败: ' + e.message};
  }
}

function renderStats(payload) {
  const s = payload.market_stats;
  if (!s) { document.getElementById('statsBar').innerHTML = ''; return; }
  document.getElementById('statsBar').innerHTML = `
    <span class="item">股票数 <b>${s.stock_count}</b></span>
    <span class="item">平均涨幅 <b>${fmt(s.market_avg_change)}%</b></span>
    <span class="item up">上涨 <b>${s.up_count}</b></span>
    <span class="item down">下跌 <b>${s.down_count}</b></span>
    <span class="item">平盘 <b>${s.flat_count}</b></span>
    <span class="item up">涨停 <b>${s.limit_up_count}</b></span>
  `;
}

function renderCharts(payload) {
  const top = payload.top_sectors || [];
  const bottom = payload.bottom_sectors || [];

  const topTrace = {
    y: top.map(s => s.concept_name),
    x: top.map(s => s.score),
    type: 'bar', orientation: 'h',
    marker: {color: top.map(s => s.score >= 0 ? '#f56c6c' : '#67c23a')},
    text: top.map(s => `s1:${fmt(s.s1_return)}% s2:${(s.s2_breadth*100).toFixed(0)}%`),
    textposition: 'outside',
    customdata: top.map(s => s.concept_code),
  };
  Plotly.newPlot('topChart', [topTrace], {
    margin: {l: 110, r: 60, t: 10, b: 30},
    yaxis: {autorange: 'reversed', font: {size: 11}},
    xaxis: {font: {size: 10}},
    height: 360,
  }, {displayModeBar: false});
  // 点击柱子高亮该板块
  document.getElementById('topChart').on('plotly_click', function(d) {
    const code = d.points[0].customdata;
    highlightSector(code);
  });

  const bottomTrace = {
    y: bottom.map(s => s.concept_name),
    x: bottom.map(s => s.score),
    type: 'bar', orientation: 'h',
    marker: {color: bottom.map(s => s.score >= 0 ? '#f56c6c' : '#67c23a')},
    text: bottom.map(s => `s1:${fmt(s.s1_return)}%`),
    textposition: 'outside',
  };
  Plotly.newPlot('bottomChart', [bottomTrace], {
    margin: {l: 110, r: 60, t: 10, b: 30},
    yaxis: {autorange: 'reversed', font: {size: 11}},
    xaxis: {font: {size: 10}},
    height: 360,
  }, {displayModeBar: false});
}

function renderMembers(payload) {
  const top = payload.top_sectors || [];
  const grid = document.getElementById('membersGrid');
  if (top.length === 0) {
    grid.innerHTML = '<div class="empty-msg">无板块数据</div>';
    return;
  }
  grid.innerHTML = top.map(s => sectorCardHtml(s)).join('');
}

function sectorCardHtml(s) {
  const headColor = s.score >= 0 ? '#f56c6c' : '#909399';
  const members = s.members_top10 || [];
  const rows = members.map(m => {
    const changeCls = m.change_ratio > 0 ? 'up' : (m.change_ratio < 0 ? 'down' : '');
    const limitTag = m.limit ? '<span style="color:#fff;background:#f56c6c;padding:0 4px;border-radius:2px;font-size:10px;">停</span>' : '';
    return `<tr>
      <td>${m.code}</td>
      <td class="${changeCls}">${fmt(m.change_ratio)}%</td>
      <td>${m.speed ? fmt(m.speed)+'%' : '-'}</td>
      <td>${m.body ? fmt(m.body)+'%' : '-'}</td>
      <td>${limitTag}</td>
      <td><b>${m.score.toFixed(2)}</b></td>
    </tr>`;
  }).join('');
  return `<div class="sector-card" data-code="${s.concept_code}">
    <div class="card-head" style="background:${headColor};">
      <span>${s.concept_name}</span>
      <span class="score">分 ${s.score.toFixed(2)} | s1 ${fmt(s.s1_return)}%</span>
    </div>
    <table>
      <tr><th>代码</th><th>涨幅</th><th>涨速</th><th>实体</th><th></th><th>综合分</th></tr>
      ${rows || '<tr><td colspan="6" style="text-align:center;color:#999;">无数据</td></tr>'}
    </table>
  </div>`;
}

function highlightSector(code) {
  document.querySelectorAll('.sector-card').forEach(c => {
    c.style.outline = c.dataset.code === code ? '2px solid #409eff' : 'none';
  });
  const target = document.querySelector(`.sector-card[data-code="${code}"]`);
  if (target) target.scrollIntoView({behavior: 'smooth', block: 'nearest'});
}

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return (n > 0 ? '+' : '') + Number(n).toFixed(2);
}

// 初始化
(async function init() {
  await loadDates();
  onModeChange(); // 默认历史模式，触发首次加载
})();
</script>
</body>
</html>
